<link rel="stylesheet" href="../assets/css/defaut/header_user.css">
<link rel="stylesheet" href="../assets/css/user/user_thongbao.css">
<link rel="stylesheet" href="../assets/fonts/fontawesome/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<header id="header_user">
    <div id="menu">
        <i class="fa-solid fa-bars"></i>
    </div>
    <div>
        <div id="notifications">
            <button id="notif-trigger" aria-label="Thông báo" type="button">
                <i class="fa-solid fa-bell"></i>
                <span class="notif-badge" aria-hidden="true">3</span>
            </button>
            <div id="notif-panel" aria-live="polite" aria-label="Danh sách thông báo">
                <div class="notif-header">Thông báo</div>
                <ul class="notif-list">
                    <li class="notif-item unread">
                        <p class="notif-text"><strong>Chúc mừng!</strong> Bạn vừa hoàn thành bài kiểm tra.</p>
                        <span class="notif-time">2 phút trước</span>
                    </li>
                    <li class="notif-item">
                        <p class="notif-text">Bạn có 5 từ vựng chưa học hôm nay.</p>
                        <span class="notif-time">10 phút trước</span>
                    </li>
                </ul>
            </div>
        </div>
        <div id="setting" aria-label="Cài đặt" role="button">
            <i class="fa-solid fa-sliders"></i>
        </div>
        <div id="user-info">
            <img src=img src="https://upload.wikimedia.org/wikipedia/commons/9/99/Sample_User_Icon.png" alt="Ảnh người dùng" />
            <span class="user-name">Đang tải...</span>
        </div>
    </div>
</header>
