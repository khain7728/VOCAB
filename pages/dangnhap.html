<!-- trang dang nhap -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/defaut/index.css">
    <link rel="stylesheet" href="../assets/css/defaut/body.css">
    <link rel="stylesheet" href="../assets/css/defaut/dangnhap.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Đăng nhập - VOCAB</title>
</head>

<body>
    <!-- header -->
    <div id="header_index"></div>

    <div id="content">
        <div class="login-container">
            <h2>Đăng nhập</h2>
            <p>Chào mừng quay lại! Hãy đăng nhập vào tài khoản của bạn.</p>

            <!-- đăng nhập bằng facebook -->
            <button class="facebook-login-button">
                <i class="fa-brands fa-facebook"></i>
                Đăng nhập với Facebook
            </button>
            <!-- Đăng nhập bằng google -->
            <button class="google-login-button">
                <i class="fa-brands fa-google"></i>
                Đăng nhập với Google
            </button>
            <div class="divider">
                <div class="line-left"></div>
                <span>Hoặc tiếp tục với email</span>
                <div class="line-right"></div>
            </div>
            <!-- nhập email & mật khẩu -->
            <div class="input-group">
                <div class="email">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Nhập email của bạn">
                </div>
                <div class="password">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu của bạn">
                </div>
            </div>
            <a href="#" style="color: black">Quên mật khẩu?</a>
            <!-- nút đăng nhập -->
            <button class="login-button">Đăng nhập</button>


            <p class="signup-link">Chưa có tài khoản? <a href="dangky.html">Đăng ký ngay</a></p>
        </div>
    </div>

    <!-- footer -->
    <div id="footer"></div>

    <script src="../assets/js/defaut/include-layout.js" defer></script>
    <script src="../assets/js/defaut/dangnhap.js" defer></script>
</body>

</html>
