<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử thao tác - Admin</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="../../assets/css/defaut/menu_admin.css">
    <link rel="stylesheet" href="../../assets/css/defaut/header_admin.css">
    <link rel="stylesheet" href="../../assets/css/admin/quanlykhoahoc.css"> </head>

<body id="app-container">

    <div id="placeholder-menu"></div>

    <div class="main-wrapper">
        <div id="placeholder-header"></div>

        <div id="content">
            <main class="page-content">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Lịch sử thao tác</h1>
                        <p>Theo dõi các hành động của Admin trong hệ thống</p>
                    </div>
                </div>

                <div class="toolbar">
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchLogBox" placeholder="Tìm kiếm hành động hoặc ID mục tiêu...">
                    </div>
                </div>

                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th style="width: 50px; text-align: center;">STT</th>
                                <th>Hành động</th>
                                <th>Mục tiêu (ID)</th>
                                <th>Admin thực hiện</th>
                                <th style="width: 200px;">Thời gian</th>
                            </tr>
                        </thead>
                        <tbody id="log_table_body">
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script src="../../assets/js/admin/layout_admin.js"></script>
    <script src="../../assets/js/admin/lichsuthaotac.js"></script>
</body>

</html>
