<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý tài khoản - Admin</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="../../assets/css/defaut/menu_admin.css">
    <link rel="stylesheet" href="../../assets/css/defaut/header_admin.css">
    <link rel="stylesheet" href="../../assets/css/admin/quanlytaikhoan.css">
</head>

<body id="app-container">

    <div id="placeholder-menu"></div>

    <div class="main-wrapper">
        <div id="placeholder-header"></div>

        <div id="content">
            <main class="page-content">
                <div class="page-header">
                    <h1 class="page-title">Quản lý tài khoản</h1>
                    <p>Xem và quản lý danh sách người dùng hệ thống</p>
                </div>

                <div class="toolbar">
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchBox" placeholder="Tìm kiếm theo tên hoặc email...">
                    </div>
                </div>

                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th style="width: 60px; text-align: center;">STT</th>
                                <th style="text-align: left;">Thông tin người dùng</th>
                                <th style="text-align: center;">Ngày tham gia</th>
                                <th style="text-align: center;">Trạng thái</th>
                                <th style="text-align: center;">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="user_table_body">
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div id="modalUserDetail" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Hồ sơ người dùng</h2>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="user-profile-header">
                    <div class="large-avatar" id="modal_avatar">A</div>
                    <div class="profile-basic">
                        <h3 id="modal_fullname">Đang tải...</h3>
                        <p id="modal_email">email@example.com</p>
                        <span id="modal_status" class="status-badge">...</span>
                    </div>
                </div>
                <div class="profile-info-grid">
                    <div class="info-item">
                        <label>ID Tài khoản</label>
                        <p id="modal_id">...</p>
                    </div>
                    <div class="info-item">
                        <label>Ngày tham gia</label>
                        <p id="modal_joined">...</p>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Đóng</button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/admin/layout_admin.js"></script>
    <script src="../../assets/js/admin/quanlytaikhoan.js"></script>
</body>

</html>
