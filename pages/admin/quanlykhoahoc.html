<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quanlykhoahoc</title>

    <link rel="stylesheet" href="../../assets/css/defaut/menu_admin.css">
    <link rel="stylesheet" href="../../assets/css/admin/admin_global.css">
    <link rel="stylesheet" href="../../assets/css/admin/quanlykhoahoc.css">

    <link rel="stylesheet" href="../../assets/fonts/fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- menu user -->
    <div id="menu_admin"></div>

    <!-- header user -->
    <div id="header_admin"></div>

    <!-- content -->
    <div id="content">
        <main class="page-content khoahoc-page">
            <div class="page-header">
                <h1 class="page-title">Quản lý khóa học</h1>
                <button class="btn btn-primary" id="add-course-btn">
                        <i class="fa-solid fa-plus"></i>
                        Thêm khóa học
                    </button>
            </div>

            <div class="search-bar">
                <i class="fa-solid fa-search"></i>
                <input type="text" placeholder="Tìm theo tên khóa học">
            </div>

            <div class="admin-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>STT</th>
                            <th>Mã khóa học</th>
                            <th>Tên khóa học</th>
                            <th>Author</th>
                            <th>Ngày tạo</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>A001</td>
                            <td>100 câu</td>
                            <td>Admin</td>
                            <td>20-20-20</td>
                            <td><span class="status-pill status-green">Công khai</span></td>
                            <td class="table-actions">
                                <i class="fa-solid fa-pen js-edit-course" title="Sửa"></i>
                                <i class="fa-solid fa-lock js-lock-course" title="Khóa"></i>
                                <i class="fa-solid fa-trash js-delete-course" title="Xóa"></i>
                            </td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>A001</td>
                            <td>100 câu</td>
                            <td>Admin</td>
                            <td>20-20-20</td>
                            <td><span class="status-pill status-green">Công khai</span></td>
                            <td class="table-actions">
                                <i class="fa-solid fa-pen js-edit-course" title="Sửa"></i>
                                <i class="fa-solid fa-lock js-lock-course" title="Khóa"></i>
                                <i class="fa-solid fa-trash js-delete-course" title="Xóa"></i>
                            </td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td>A001</td>
                            <td>100 câu</td>
                            <td>Admin</td>
                            <td>20-20-20</td>
                            <td><span class="status-pill status-red">Riêng tư</span></td>
                            <td class="table-actions">
                                <i class="fa-solid fa-pen js-edit-course" title="Sửa"></i>
                                <i class="fa-solid fa-lock-open js-lock-course" title="Mở khóa"></i>
                                <i class="fa-solid fa-trash js-delete-course" title="Xóa"></i>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Script để load menu và header -->
    <script src="../../assets/js/admin/layout_admin.js"></script>
    <script src="../../assets/js/admin/quanlykhoahoc.js"></script>
</body>

</html>
