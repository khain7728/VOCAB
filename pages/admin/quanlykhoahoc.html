<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý khóa học - Admin</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="../../assets/css/defaut/menu_admin.css">
    <link rel="stylesheet" href="../../assets/css/defaut/header_admin.css">
    <link rel="stylesheet" href="../../assets/css/admin/quanlykhoahoc.css">
</head>

<body id="app-container">

    <div id="placeholder-menu"></div>

    <div class="main-wrapper">
        <div id="placeholder-header"></div>

        <div id="content">
            <main class="page-content">
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Quản lý khóa học</h1>
                        <p>Danh sách các khóa học hiện có trong hệ thống</p>
                    </div>
                    <button class="btn-primary" id="btnOpenAddModal">
                        <i class="fa-solid fa-plus"></i> Tạo khóa học
                    </button>
                </div>

                <div class="toolbar">
                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchBox" placeholder="Tìm kiếm tên hoặc mã khóa học...">
                    </div>
                </div>

                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th class="w-50 text-center">STT</th>
                                <th>Mã KH</th>
                                <th>Tên khóa học</th>
                                <th>Người tạo</th>
                                <th>Ngày tạo</th>
                                <th class="text-center">Trạng thái</th>
                                <th class="text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="course_table_body">
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div id="courseModal" class="modal">
        <div class="modal-content modern-modal">
            <div class="modal-header no-border">
                <div class="header-text">
                    <h3 id="modalTitle" class="modal-title-bold">Thêm Khóa học Mới</h3>
                    <p class="modal-subtitle">Nhập đầy đủ thông tin và những ô có dấu (*)</p>
                </div>
                <span class="close-btn" id="btnCloseCourseModal">&times;</span>
            </div>

            <div class="modal-body">
                <input type="hidden" id="courseId">
                <input type="hidden" id="courseCode">

                <div class="form-group">
                    <label>Tên khóa học <span class="text-red">*</span></label>
                    <input type="text" id="courseName" class="input-modern" placeholder="Nhập tên khóa học">
                </div>

                <div class="form-row">
                    <div class="form-group half-width">
                        <label>Trạng thái</label>
                        <div class="select-wrapper">
                            <select id="courseStatus" class="input-modern">
                                <option value="active">Công khai</option>
                                <option value="hidden">Riêng tư</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group half-width">
                        <label>Tag <span class="text-red">*</span></label>
                        <input type="text" id="courseTag" class="input-modern" placeholder="Chọn tag...">
                        <a href="#" id="btnOpenTagModal" class="link-modal text-blue">Hoặc chọn tag có sẵn</a>
                    </div>
                </div>

                <div class="form-group">
                    <label>Mô tả khóa học</label>
                    <textarea id="courseDescription" rows="4" class="input-modern" placeholder="Nhập mô tả khóa học tại đây"></textarea>
                </div>
            </div>

            <div class="modal-footer no-border footer-right">
                <button class="btn-cancel-gray" id="btnCancelCourseModal">Hủy</button>
                <button class="btn-save-blue" id="saveCourseBtn" type="button">Thêm từ vựng</button>
            </div>
        </div>
    </div>

    <div id="tagModal" class="modal">
        <div class="modal-content small-modal">
            <div class="modal-header">
                <h3 class="modalTitle">Thêm Tag</h3>
                <span class="close-btn" id="btnCloseTagModal">&times;</span>
            </div>

            <div class="modal-body">
                <p class="small-title">Tag đã chọn</p>
                <div class="tag-list-container" id="khung-tag-da-chon"></div>

                <p class="small-title">Tag gợi ý</p>
                <div class="tag-list-container" id="khung-tag-goi-y"></div>
            </div>

            <div class="modal-footer one-button">
                <button type="button" id="btnConfirmTag" class="btn-save">Xác nhận</button>
            </div>
        </div>
    </div>
    <script src="../../assets/js/defaut/auth_check.js"></script>
    <script src="../../assets/js/admin/layout_admin.js"></script>
    <script src="../../assets/js/admin/quanlykhoahoc.js"></script>
</body>

</html>
