<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/css/defaut/body.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/user/chi_tiet_khoa_hoc.css">
    <title>chi_tiet_khoa_hoc</title>
</head>

<body>
    <div id="menu_user"></div>

    <div id="header_user"></div>

    <div id="content">
        <div id="main">

            <div class="khung-dieu-huong-tren">
                <button id="btn-tro-ve"><i class="fa-solid fa-arrow-left"></i> Trở về</button>
                <h2 id="tieu-de-khoa-hoc-chinh">Tiếng Anh cơ bản</h2>
                <div class="khung-nut-hanh-dong-tren">
                    <button id="btn-them-tu-vung" class="nut-hanh-dong-tren nut-xanh an">
                        <i class="fa-solid fa-plus"></i> Thêm từ vựng
                    </button>
                    <button id="btn-them-khoa-hoc" class="nut-hanh-dong-tren nut-xanh an">
                        <i class="fa-solid fa-plus"></i> Thêm khóa học
                    </button>
                    <button id="btn-xoa-khoa-hoc" class="nut-hanh-dong-tren nut-do an">
                        <i class="fa-solid fa-trash-can"></i> Xóa khóa học
                    </button>
                </div>
            </div>

            <div class="khung-thong-so">
                <div class="khoi-thong-so mau-1">
                    <span class="tieu-de-khoi mau-1">Tác Giả</span>
                    <span class="giatri-khoi" id="giatri-tac-gia">User</span>
                </div>
                <div class="khoi-thong-so mau-2">
                    <span class="tieu-de-khoi mau-2">Tiến Độ</span>
                    <span class="giatri-khoi" id="giatri-tien-do">50%</span>
                </div>
                <div class="khoi-thong-so mau-3">
                    <span class="tieu-de-khoi mau-3">Số Lần Ôn</span>
                    <span class="giatri-khoi" id="giatri-so-lan-on">0</span>
                </div>
            </div>

            <div class="khung-danh-sach-tu">
                <h3 class="tieu-de-danh-sach">Danh sách từ vựng</h3>
                <div class="khung-chua-danh-sach" id="danh-sach-tu-vung-container">
                    </div>
            </div>

            <div class="khung-nut-bam-duoi">
                <button class="nut-hoc-tap" id="btn-hoc">Học</button>
                <button class="nut-hoc-tap" id="btn-on-tap">Ôn tập</button>
                <button class="nut-hoc-tap" id="btn-kiem-tra">Kiểm tra</button>
            </div>

        </div>
    </div>

    <audio id="audio-player-an" style="display: none;"></audio>


    <div id="khung-che-mo" class="an">
        <div id="modal-hoan-thanh-hoc" class="modal-noi-dung an">
            <h2 class="tieu-de-modal">Bạn đã hoàn thành khóa học</h2>
            <p class="mota-modal">Bạn muốn ôn tập hay học lại?</p>
            
            <div class="khung-nut-modal">
                <button type="button" id="btn-modal-tiep-tuc" class="nut-modal nut-phu">Ôn tập</button>
                <button type="button" id="btn-modal-hoc-lai" class="nut-modal nut-xacnhan">Học lại</button>
            </div>
        </div>
    </div>
    <script src="../../assets/js/user/layout_user.js"></script>
    <script src="../../assets/js/user/chi_tiet_khoa_hoc.js"></script>
</body>

</html>
